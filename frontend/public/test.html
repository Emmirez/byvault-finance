<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Test Page</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .success {
            color: #4ade80;
            font-weight: bold;
        }
        .info {
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            font-family: monospace;
        }
        .button {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: white;
            color: #764ba2;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: bold;
            margin-top: 1rem;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Vercel Test Page</h1>
        <p>If you can see this page, <span class="success">Vercel is serving static files correctly!</span></p>
        
        <div class="info">
            <p><strong>Test Information:</strong></p>
            <p>📍 Current URL: <span id="current-url"></span></p>
            <p>📁 This file is located at: <code>/public/test.html</code></p>
            <p>🕒 Time loaded: <span id="timestamp"></span></p>
        </div>

        <a href="/" class="button">Go to Homepage</a>
        <a href="/dashboard" class="button">Try Dashboard</a>
        <a href="/savings" class="button">Try Savings</a>

        <script>
            document.getElementById('current-url').textContent = window.location.href;
            document.getElementById('timestamp').textContent = new Date().toLocaleString();
        </script>
    </div>
</body>
</html>
