<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Byvault-Finance</title>

     <script>
      (function () {
        var saved = localStorage.getItem("language");
        if (!saved || saved === "en") {
          // Ensure both systems agree on English
          localStorage.setItem("language", "en");
          localStorage.removeItem("i18nextLng");
          // Nuke the googtrans cookie before Google Translate script loads
          var domains = [window.location.hostname, "." + window.location.hostname];
          domains.forEach(function (d) {
            document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=" + d;
          });
          document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
  </body>
</html>
