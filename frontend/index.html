<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Byvault-Finance</title>
    <script>
      (function () {
        var savedLang = localStorage.getItem('app:selectedLanguage');

        // Always nuke the cookie first
        function clearGoogTrans() {
          var domains = [window.location.hostname, '.' + window.location.hostname];
          domains.forEach(function (d) {
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + d;
          });
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
        }

        if (!savedLang || savedLang === 'en') {
          // User wants English — clear cookie and BLOCK Google Translate
          clearGoogTrans();

          // Override cookie setter to prevent googtrans from being set
          var originalDescriptor = Object.getOwnPropertyDescriptor(Document.prototype, 'cookie');
          Object.defineProperty(document, 'cookie', {
            get: function () {
              return originalDescriptor.get.call(document);
            },
            set: function (val) {
              // Block any attempt to set googtrans cookie
              if (val && val.indexOf('googtrans') !== -1 && val.indexOf('expires=Thu, 01 Jan 1970') === -1) {
                return;
              }
              originalDescriptor.set.call(document, val);
            },
            configurable: true,
          });
        } else {
          // User wants a non-English language — set the cookie for Google Translate
          document.cookie = 'googtrans=/en/' + savedLang + '; path=/';
          document.cookie = 'googtrans=/en/' + savedLang + '; path=/; domain=' + window.location.hostname;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
